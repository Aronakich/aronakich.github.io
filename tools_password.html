      <!-- pass -->
      <div class="inputBox">
        <center><input type="text" name="" placeholder="Пароль" id="password" readonly=""></center>
        <center><button class="button48" role="button" onclick="getPassword();"><span class="text">Сгенирировать пароль</span></button></center>
      </div>

      <script type="text/javascript">
        function getPassword(){

            var chars = "0123456789abcdlalalakakssamASKDMASKDMASKDMASKDMKASMKMS";
            var passwordLength = 16;
            var password = "";

            for (var i=0; i<passwordLength; i++){
                var randomNumber = Math.floor(Math.random() * chars.length);
                password += chars.substring(randomNumber, randomNumber+1);
            }
            document.getElementById("password").value = password
        }

      </script>
